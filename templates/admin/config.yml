backend:
  name: git-gateway
  branch: main

# Resimleri ana dizindeki tertemiz bir 'images' klasöründe topluyoruz
media_folder: "images"
public_folder: "/images"

collections:
  - name: "tarih-makaleleri"
    label: "Tarih Makaleleri"
    folder: "content"
    create: true
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    fields:
      - { label: "Başlık", name: "title", widget: "string" }
      - { label: "Yayınlanma Tarihi", name: "date", widget: "datetime", format: "YYYY-MM-DD", date_format: "YYYY-MM-DD", time_format: false }
      - { 
          label: "Yazı İçeriği", 
          name: "body", 
          widget: "markdown", 
          minimal: false,
          buttons: ["bold", "italic", "code", "link", "heading-one", "heading-two", "quote", "bulleted-list", "numbered-list"],
          editor_components: ["image"]
        }